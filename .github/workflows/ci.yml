name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: ruff check
        run: ruff check src/ cascadeur_side/ tests/ scripts/

      - name: ruff format --check
        run: ruff format --check src/ cascadeur_side/ tests/ scripts/

  syntax-check:
    name: cascadeur_side parses on Python 3.8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Cascadeur 2025.3.x embedded interpreter is Python 3.8. Anything in
      # cascadeur_side/ has to keep parsing there — verify by compiling under
      # a real 3.8 interpreter on every push.
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: py_compile cascadeur_side
        run: python -m py_compile cascadeur_side/poppet/*.py

  tests:
    name: tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        if: hashFiles('tests/**/*.py') != ''
        run: pytest tests/ -v

  mcp-smoke:
    name: mcp smoke (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      # Boots the poppet-mcp server over stdio, completes the MCP handshake,
      # lists tools + resources, then exits. POPPET_LIVE stays unset so no real
      # Cascadeur connection is attempted.
      - name: Smoke test MCP server
        run: python scripts/mcp_smoke_test.py
